# logstash.conf — Pipeline de procesamiento de logs
# SIEM Inteligente | UTN FRM | Gianfranco Canciani
#
# CAMBIO CLAVE respecto a la versión original:
# En lugar de un único patrón Grok que descarta todo lo que no es SSH,
# ahora hay routing condicional para cada tipo de log que el simulador genera.
# Cada RU tiene su propio bloque de parsing.

input {
  tcp {
    port => 5044
    codec => plain { charset => "UTF-8" }
  }
}

filter {

  # ──────────────────────────────────────────────────────────────
  # RU-1: Fuerza Bruta SSH — "Failed password for X from IP"
  # ──────────────────────────────────────────────────────────────
  if [message] =~ "Failed password" {
    grok {
      match => {
        "message" => "%{SYSLOGTIMESTAMP:timestamp_raw} %{DATA:hostname} sshd\[%{POSINT:pid}\]: %{DATA:ssh_status} password for %{DATA:user} from %{IP:source_ip} port %{POSINT:port}"
      }
    }
    mutate {
      add_field => {
        "[event][category]" => "authentication"
        "[event][type]"     => "start"
        "[rule][name]"      => "RU-1"
        "[rule][description]" => "Intento fallido de autenticacion SSH"
      }
    }
  }

  # ──────────────────────────────────────────────────────────────
  # RU-2: Acceso Exitoso (potencialmente anómalo por horario)
  # "Accepted password for X from IP"
  # ──────────────────────────────────────────────────────────────
  else if [message] =~ "Accepted password" or [message] =~ "EXITOSO" {
    grok {
      match => {
        "message" => "%{SYSLOGTIMESTAMP:timestamp_raw} %{DATA:hostname} sshd\[%{POSINT:pid}\]: %{DATA:ssh_status} password for %{DATA:user} from %{IP:source_ip} port %{POSINT:port}"      }
    }
    mutate {
      add_field => {
        "[event][category]" => "authentication"
        "[event][type]"     => "end"
        "[rule][name]"      => "RU-2"
        "[rule][description]" => "Acceso exitoso SSH - evaluar horario"
      }
    }
  }

  # ──────────────────────────────────────────────────────────────
  # RU-3: Pico de CPU / Recursos — "SPIKE_CPU detectado"
  # ──────────────────────────────────────────────────────────────
 else if [message] =~ "SPIKE_CPU" {
    grok {
      match => {
        "message" => "%{SYSLOGTIMESTAMP:timestamp_raw} %{DATA:hostname} systemd\[%{POSINT:pid}\]: METRICA ANOMALA: SPIKE_CPU detectado al %{NUMBER:cpu_usage}% \(Desviacion > 3 sigma\) en host %{IP:source_ip}"
      }
    }
    mutate {
      add_field => {
        "[event][category]" => "process"
        "[event][type]"     => "info"
        "[rule][name]"      => "RU-3"
        "[rule][description]" => "Pico de consumo de CPU detectado"
      }
      convert => { "cpu_usage" => "float" }
    }
  }

  # ──────────────────────────────────────────────────────────────
  # T1040: Modo Promiscuo de Red (Network Sniffing)
  # ──────────────────────────────────────────────────────────────
  else if [message] =~ "promiscuous" or [message] =~ "promisc" {
    mutate {
      add_field => {
        "[event][category]" => "network"
        "[event][type]"     => "change"
        "[rule][name]"      => "T1040"
        "[rule][description]" => "Interfaz de red en modo promiscuo detectada"
      }
    }
  }

  # ──────────────────────────────────────────────────────────────
  # T1071: Beaconing C2 — patrones de User-Agent anómalos
  # ──────────────────────────────────────────────────────────────
  else if [message] =~ "beaconing" or [message] =~ "C2" {
    mutate {
      add_field => {
        "[event][category]" => "network"
        "[event][type]"     => "connection"
        "[rule][name]"      => "T1071"
        "[rule][description]" => "Posible canal Command and Control detectado"
      }
    }
  }

  # ──────────────────────────────────────────────────────────────
  # CATCH-ALL: cualquier otro log se indexa como "unknown"
  # NO lo descartamos — podría ser relevante para el ML
  # ──────────────────────────────────────────────────────────────
  else {
    mutate {
      add_field => {
        "[event][category]" => "unknown"
        "[rule][name]"      => "CATCH-ALL"
      }
    }
  }

  # ──────────────────────────────────────────────────────────────
  # NORMALIZACIÓN ECS (aplica a todos los eventos)
  # ──────────────────────────────────────────────────────────────
  mutate {
    # Timestamp de ingesta siempre presente
    add_field => { "ingesta_timestamp" => "%{@timestamp}" }
  }

  # Si el Grok falló (solo en bloques que lo usan), marcamos pero NO descartamos
  if "_grokparsefailure" in [tags] {
    mutate {
      add_field => { "parse_error" => "true" }
      remove_tag => ["_grokparsefailure"]
    }
  }
}

output {
  # Todos los logs van a Elasticsearch
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "eventos-seguridad-%{+YYYY.MM.dd}"
  }

  # Solo mostrar en consola si hay parse_error o en modo debug
  # (comentar la línea de abajo en producción para no saturar la terminal)
  stdout { codec => rubydebug }
}
